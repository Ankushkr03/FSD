name: Experiment 20 CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Experiment-20/**'
  pull_request:
    branches: [main]
    paths:
      - 'Experiment-20/**'

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: Experiment-20/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: Experiment-20/backend
        run: pytest -v

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Experiment-20/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Experiment-20/frontend
        run: npm install

      - name: Run tests
        working-directory: Experiment-20/frontend
        run: npm run test

  backend-docker:
    name: backend-docker
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t exp20-backend ./Experiment-20/backend

  frontend-docker:
    name: frontend-docker
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: docker build -t exp20-frontend ./Experiment-20/frontend

  deploy:
    name: deploy
    needs: [backend-docker, frontend-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulated Deploy
        run: |
          echo "🚀 Deploying Experiment-20 to Production..."
          echo "✅ Backend and Frontend images are verified."
          echo "✅ Deployment successful!"
