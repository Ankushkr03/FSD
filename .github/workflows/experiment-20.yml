name: Experiment-20 Tests

on:
  push:
    paths:
      - 'Experiment-20/**'
  pull_request:
    paths:
      - 'Experiment-20/**'

jobs:
  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: Experiment-20/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pymysql

      - name: Run tests
        working-directory: Experiment-20/backend
        run: pytest -v

  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Experiment-20/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Experiment-20/frontend
        run: npm install

      - name: Run tests
        working-directory: Experiment-20/frontend
        run: npm run test

  backend-docker:
    name: 🐳 Backend Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t experiment-20-backend ./Experiment-20/backend

  frontend-docker:
    name: 🐳 Frontend Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: docker build -t experiment-20-frontend ./Experiment-20/frontend
