name: CI - Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend Tests (pytest)
  # ─────────────────────────────────────────
  backend-tests:
    name: 🐍 Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Testing/Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: Testing/Backend
        run: pytest -v

  # ─────────────────────────────────────────
  # JOB 2: Frontend Tests (vitest)
  # ─────────────────────────────────────────
  frontend-tests:
    name: ⚛️ Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Testing/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Testing/Frontend
        run: npm install

      - name: Run vitest
        working-directory: Testing/Frontend
        run: npm run test -- --run
